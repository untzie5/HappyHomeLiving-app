<main>
  <h1>Edit user</h1>

  <form id="edit-form">
    <div>
      <label id="lbl-username">New username (optional)</label>
      <input name="username" type="text" />
    </div>

    <div>
      <label id="lbl-password">New password (optional)</label>
      <input name="password" type="password" />
    </div>

    <button type="submit" id="confirm-btn">Confirm</button>
    <button type="button" id="back-btn">Back</button>

    <p id="edit-error" class="cu-error" hidden></p>
    <p id="edit-success" class="cu-success" hidden></p>
  </form>
    <section class="danger-zone">
    <h2>Danger zone</h2>
    <p>Delete your account permanently.</p>
    <delete-user id="deleteUser"></delete-user>
  </section>
</main>

<main class="dashboard-page">
  <header class="dashboard-header">
    <div class="brand-area">
    <div class="app-title">
      <img src="/assets/icons/house-512.png" alt="App icon" class="app-icon" />
      <h1>Happy Home Living</h1>
    </div>

      <div class="user-bar">
        <p class="user-text">
          User: <strong id="usernameText"></strong>
        </p>

        <button type="button" id="edit-user-btn" class="edit-btn">
          Edit
        </button>
      </div>
    </div>

    <div class="header-actions">
      <button type="button" id="logout-btn">Logout</button>
    </div>
  </header>

  <p id="dash-error" class="cu-error" hidden></p>

  <section class="dashboard-content">
    <section class="calendar-section">
      <h2 id="calendarTitle">Calendar</h2>
      <div id="calendar-container"></div>
    </section>

    <sectionclass="todo-form">
      <h2 id="todoTitle"> To do</h2>

      <form id="todo-form" class="todo-form">
        <input id="todo-input" name="text" type="text" placeholder="Add a task..." required/>

        <label class="todo-check">
          <input type="checkbox" id="repeatWeekly" name="repeatWeekly" />
          Repeat weekly
        </label>

         <label class="todo-check">
          <input type="checkbox" id="removeWhenDone" name="removeWhenDone" />
          Remove when done
        </label>

         <button type="submit">Add</button>
      </form>

      <p id="todo-error" class="cu-error" hidden></p>

      <ul id="todo-list" class="todo-list"></ul>
    </section>
  </section>
</main>

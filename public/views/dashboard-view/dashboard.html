<main class="dashboard-page">
  <header class="dashboard-header">
    <div class="brand-area">
      <div class="app-title">
        <img src="/assets/icons/house-512.png" alt="App icon" class="app-icon" />
        <h1 id="dashboard-app-title">Happy Home Living</h1>
      </div>

      <div class="user-bar">
        <p class="user-text">
          <span id="user-label">User:</span> <strong id="usernameText"></strong></p>
          <button type="button" id="edit-user-btn" class="edit-btn">Edit</button>
      </div>
    </div>

    <div class="header-actions">
      <button type="button" id="logout-btn">Logout</button>
    </div>
  </header>

  <div class="dashboard-content">
    <section class="todo-section">
      <h2 id="todo-title">To do</h2>

      <form id="todo-form" class="todo-form">
        <input
          id="todo-input"
          name="text"
          type="text"
          placeholder="Add a task..."
          required
        />

        <label class="todo-check">
          <input type="checkbox" id="repeatWeekly" name="repeatWeekly" />
          <span id="repeatWeekly-label">Repeat weekly</span>
        </label>

        <label class="todo-check">
          <input type="checkbox" id="removeWhenDone" name="removeWhenDone" />
          <span id="removeWhenDone-label">Remove when done</span>
        </label>

        <button type="submit" id="todo-submit-btn">Add</button>
      </form>

      <p id="todo-error" class="cu-error" hidden></p>
      <ul id="todo-list" class="todo-list"></ul>
    </section>

    <section class="calendar-section">
      <h2 id="calendar-title">Calendar</h2>
      <div id="calendar-container"></div>
    </section>
  </div>
</main>
